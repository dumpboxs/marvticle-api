name: elysiajs-paib-koding

services:
  postgres:
    image: postgres
    container_name: elysiajs-paib-koding-postgres
    environment:
      POSTGRES_DB: elysiajs-paib-koding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - elysiajs-paib-koding_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  elysiajs-paib-koding_postgres_data:
